<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes">
<title>槐树AI</title>
<style>#decryptUI{position:fixed;inset:0;background:#1C1B1F;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.decrypt-box{text-align:center;padding:32px;max-width:360px;width:90%}
.decrypt-icon{font-size:64px;margin-bottom:16px;opacity:.6}
.decrypt-title{font-size:22px;font-weight:700;color:#E6E1E5;margin-bottom:24px}
.decrypt-status{font-size:12px;color:#9E9CAB;margin-bottom:16px;min-height:18px}
.decrypt-status.ok{color:#66BB6A}
.decrypt-status.err{color:#F2B8B5}
.decrypt-input{width:100%;text-align:center;font-size:18px;letter-spacing:8px;padding:12px;border:1px solid #49454F;border-radius:8px;background:#1C1B1F;color:#E6E1E5;margin-bottom:12px;outline:none;box-sizing:border-box}
.decrypt-input:focus{border-color:#D0BCFF}
.decrypt-btn{width:100%;padding:12px;border-radius:20px;background:#D0BCFF;color:#381E72;font-size:16px;font-weight:600;border:none;cursor:pointer;margin-top:8px;transition:opacity .2s}
.decrypt-btn:active{opacity:.8}
.decrypt-btn:disabled{opacity:.4;cursor:not-allowed}
.decrypt-error{color:#F2B8B5;font-size:12px;margin-top:8px;min-height:18px}
.decrypt-hint{color:#CAC4D0;font-size:11px;margin-top:16px;opacity:.7}</style>
</head>
<body>
<div id="decryptUI">
<div class="decrypt-box">
<div class="decrypt-icon">🔐</div>
<div class="decrypt-title">密码验证</div>
<div class="decrypt-status" id="keyStatus">正在加载密钥...</div>
<input type="password" class="decrypt-input" id="decPwd" placeholder="输入密码" maxlength="20" autocomplete="off" disabled>
<button class="decrypt-btn" id="decBtn" disabled>解密并启动</button>
<div class="decrypt-error" id="decError"></div>
<div class="decrypt-hint">输入密码访问加密内容</div>
</div>
</div>
